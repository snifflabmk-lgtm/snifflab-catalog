<!DOCTYPE html>
<html lang="mk">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sniff Lab Каталог</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<header>

    <img src="logo.png" alt="Sniff Lab Logo" class="logo">

    <h1>Sniff Lab</h1>

    <p>Луксузно парфемско искуство</p>

</header>



<main>


<section class="hero">


    <div class="hero-content">


        <h2>
            Откриј го твојот совршен мирис
        </h2>


        <p>
            Премиум парфеми во декант издание.
            Пробај пред да купиш цело шише.
        </p>


        <button>
            Истражи ја колекцијата
        </button>


    </div>


</section>




<section class="collection">


    <h2>
        Колекција
    </h2>



    <div class="perfume-card">


        <img src="afnan-9pm.webp" alt="Afnan 9PM">


        <div class="perfume-info">


            <h3>
                Afnan 9PM
            </h3>


            <p>
                Afnan
            </p>


            <p>
                Машки парфем
            </p>


        </div>


    </div>


</section>



</main>



<script src="script.js"></script>


</body>

</html>
