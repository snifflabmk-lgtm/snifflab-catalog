<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Каталог | Sniff Lab</title>

  <meta
    name="description"
    content="Пребарајте и откријте го вашиот следен омилен парфем во каталогот на Sniff Lab."
  >

  <link rel="stylesheet" href="style.css?v=4">
  <link rel="stylesheet" href="components.css?v=3">
</head>

<body class="catalog-page">
  <div class="announcement-bar">
    <button
      class="announcement-arrow"
      type="button"
      aria-label="Претходна информација"
    >
      ‹
    </button>

    <p class="announcement-message">
      ✨ 100% оригинални парфеми — тестирај пред да купиш цело шише
    </p>

    <button
      class="announcement-arrow"
      type="button"
      aria-label="Следна информација"
    >
      ›
    </button>
  </div>

  <header class="catalog-header">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Sniff Lab лого">
    </a>

    <nav
      class="navigation"
      aria-label="Главна навигација"
    >
      <a href="index.html">
        Почетна
      </a>

      <a href="catalog.html" class="active">
        Каталог
      </a>

      <a href="about.html">
        За нас
      </a>

      <a href="delivery.html">
        Испорака
      </a>

      <a href="contact.html">
        Контакт
      </a>

      <button
        type="button"
        id="search-toggle"
        class="nav-search-button"
        aria-expanded="false"
        aria-controls="header-search-panel"
      >
        🔍 Search
      </button>

      <a href="cart.html" class="cart-link">
        🛒 Кошничка
        <span class="cart-count">0</span>
      </a>
    </nav>
  </header>

  <main class="collection-main">
    <section class="collection-heading">
      <p class="eyebrow">
        Sniff Lab
      </p>

      <h1>
        Види ја колекцијата
      </h1>

      <p>
        Избери го твојот совршен мирис
      </p>
    </section>

    <section
      class="catalog-tools"
      aria-label="Филтри"
    >
      <input
        type="search"
        id="product-search"
        hidden
        tabindex="-1"
        aria-hidden="true"
      >

      <div class="filter-wrapper">
        <p>
          Категории
        </p>

        <div class="filter-buttons">
          <button
            type="button"
            class="filter-button active-filter"
            data-category="site"
          >
            Сите
          </button>

          <button
            type="button"
            class="filter-button"
            data-category="arapski"
          >
            Арапски
          </button>

          <button
            type="button"
            class="filter-button"
            data-category="dizajnerski"
          >
            Дизајнерски
          </button>

          <button
            type="button"
            class="filter-button"
            data-category="nish"
          >
            Ниш
          </button>
        </div>
      </div>
    </section>

    <p
      id="results-message"
      class="results-message"
    >
      Се вчитуваат парфемите...
    </p>

    <section
      id="product-grid"
      class="collection-grid"
      aria-label="Колекција парфеми"
    ></section>
  </main>

  <footer class="footer">
    <p>
      &copy; 2026 Sniff Lab. Сите права се задржани.
    </p>

    <a href="mailto:sniff.lab.mk@gmail.com">
      sniff.lab.mk@gmail.com
    </a>
  </footer>

  <script src="products.js?v=1"></script>
  <script src="site.js?v=3"></script>
  <script src="catalog.js?v=1"></script>
</body>
</html>
